name: CI/CD Reviews Service

on:
  push:
    branches:
      - main  # Esto dispara el proceso cada vez que haces 'git push origin main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build Docker Image
        # Agregamos la ruta ./Service/reviews al final para que encuentre el Dockerfile
        run: docker build -t registry.digitalocean.com/mi-ecommerce-reviews-proyecto/review-service:${{ github.sha }} ./Service/reviews

      - name: Log in to DigitalOcean Registry
        run: doctl registry login --expiry-seconds 600

      - name: Push Image to Registry
        run: docker push registry.digitalocean.com/mi-ecommerce-reviews-proyecto/review-service:${{ github.sha }}

      - name: Update Kubernetes Deployment
        run: |
          doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_ID }}
          # Ajustamos la ruta para que encuentre el deployment.yaml dentro de las carpetas
          sed -i 's|image:.*|image: registry.digitalocean.com/mi-ecommerce-reviews-proyecto/review-service:${{ github.sha }}|' ./Service/reviews/deployment.yaml
          kubectl apply -f ./Service/reviews/deployment.yaml