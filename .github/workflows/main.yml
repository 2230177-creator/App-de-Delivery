name: CI/CD Reviews Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build Docker Image
        # Como el Dockerfile está en la raíz, usamos el punto (.)
        run: docker build -t registry.digitalocean.com/mi-ecommerce-reviews-proyecto/review-service:${{ github.sha }} .

      - name: Log in to DigitalOcean Registry
        run: doctl registry login --expiry-seconds 600

      - name: Push Image to Registry
        run: docker push registry.digitalocean.com/mi-ecommerce-reviews-proyecto/review-service:${{ github.sha }}

      - name: Update Kubernetes Deployment
        run: |
          doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_ID }}
          # Como deployment.yaml está en la raíz, no ponemos rutas extra
          sed -i 's|image:.*|image: registry.digitalocean.com/mi-ecommerce-reviews-proyecto/review-service:${{ github.sha }}|' deployment.yaml
          kubectl apply -f deployment.yaml